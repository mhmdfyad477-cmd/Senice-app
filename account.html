<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي | قسم علوم ابتدائي</title>
<style>
  :root{--blue-deep:#0a2e5c;--blue-main:#1565d8;--blue-bright:#2f9bf0;--ice:#eaf4ff;--gold:#f5a623;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Arial,sans-serif;}
  body{background:var(--ice);color:#0a2e5c;min-height:100vh;}
  .topbar{background:linear-gradient(135deg,var(--blue-main),var(--blue-deep));color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:30;box-shadow:0 4px 14px rgba(10,46,92,0.25);}
  .topbar a{color:#fff;text-decoration:none;font-size:13px;background:rgba(255,255,255,0.15);padding:8px 14px;border-radius:10px;transition:0.2s;}
  .topbar a:hover{background:rgba(255,255,255,0.25);}
  .wrap{max-width:600px;margin:24px auto;padding:0 16px;}
  .card-box{background:#fff;border-radius:16px;padding:24px;box-shadow:0 6px 18px rgba(10,46,92,0.06);margin-bottom:14px;}
  .avatar-upload{display:flex;flex-direction:column;align-items:center;margin-bottom:16px;}
  .avatar-upload .av-img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--blue-main);}
  .avatar-upload .av-ph{width:80px;height:80px;border-radius:50%;background:var(--blue-bright);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:800;border:3px solid var(--blue-main);}
  .avatar-upload label{margin-top:8px;background:var(--ice);color:var(--blue-main);border:1.5px solid var(--blue-main);border-radius:10px;padding:6px 14px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .account-field{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f4fa;font-size:14px;}
  .account-field b{color:#7a93ad;font-weight:600;}
  .form-group{margin-top:16px;}
  .form-group label{font-size:12.5px;font-weight:700;color:var(--blue-deep);display:block;margin-bottom:4px;}
  .form-group .row{display:flex;gap:8px;}
  .form-group .row input{flex:1;padding:10px;border-radius:10px;border:1.5px solid #cfe2f7;font-size:14px;}
  .form-group .row button{background:var(--blue-main);color:#fff;border:none;border-radius:10px;padding:0 18px;cursor:pointer;font-weight:700;font-size:14px;}
  .msg{font-size:12.5px;margin-top:8px;color:#147a35;}
  .msg.error{color:#b00020;}
  .footer{text-align:center;font-size:11.5px;color:#9bb3cb;padding:18px 0;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand" style="font-weight:800;font-size:16px;">👤 حسابي</div>
  <a href="home.html">🏠 الرجوع للرئيسية</a>
</div>

<div class="wrap">
  <div class="card-box">
    <div class="avatar-upload">
      <div id="accAvatarWrap"><div class="av-ph" id="accAvatarPh">؟</div></div>
      <label>📷 تغيير الصورة<input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar()"></label>
      <div id="avatarMsg" style="font-size:12px;color:#7a93ad;margin-top:4px"></div>
    </div>

    <div class="account-field"><b>الاسم</b><span id="accName"></span></div>
    <div class="account-field"><b>رقم الموبايل</b><span id="accPhone"></span></div>
    <div class="account-field"><b>الفرقة</b><span id="accYear"></span></div>
    <div class="account-field"><b>نقاط الفخر</b><span id="accPoints"></span></div>

    <div class="form-group">
      <label>كلمة مرور جديدة</label>
      <div class="row">
        <input type="password" id="newPass" placeholder="أدخل كلمة المرور الجديدة">
        <button onclick="updatePassword()">حفظ</button>
      </div>
      <div id="accMsg" class="msg"></div>
    </div>
  </div>
</div>

<div class="footer">تم إنشاء هذا الموقع بواسطة MF.mo.fayyad</div>

<!-- Firebase & Libraries -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBgI8VcLOdQAMgmcpxCzaMS1UCX1vyzSjw",
    authDomain: "science-e2b52.firebaseapp.com",
    projectId: "science-e2b52",
    storageBucket: "science-e2b52.firebasestorage.app",
    messagingSenderId: "1031434005860",
    appId: "1:1031434005860:web:e68fccdd746017a5639e71",
    measurementId: "G-JZ1SFVMM7P"
  };
  let db = null;
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  } catch (e) { console.warn('لا يوجد اتصال بالإنترنت', e); }

  // -------------------- دوال المستخدم --------------------
  function getCurrentUser() {
    const raw = localStorage.getItem('currentUser');
    return raw ? JSON.parse(raw) : null;
  }
  function requireLogin() {
    const u = getCurrentUser();
    if (!u) { window.location.href = 'login.html'; return null; }
    return u;
  }
  const user = requireLogin();
  if (!user) throw new Error('no user');

  // -------------------- تحميل بيانات المستخدم --------------------
  async function loadUserData() {
    if (!db) return;
    try {
      const snap = await db.collection('users').doc(user.phone).get();
      const data = snap.data();
      if (!data) return;
      document.getElementById('accName').textContent = data.name || '';
      document.getElementById('accPhone').textContent = data.phone || '';
      document.getElementById('accYear').textContent = data.year || '—';
      document.getElementById('accPoints').textContent = (data.points || 0) + ' نقطة';
      if (data.avatar) {
        document.getElementById('accAvatarWrap').innerHTML = `<img class="av-img" src="${data.avatar}">`;
      }
    } catch (e) { console.error(e); }
  }
  loadUserData();

  // -------------------- ضغط الصورة --------------------
  function compressImage(file, maxW, maxH, quality) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = function (e) {
        const img = new Image();
        img.onload = function () {
          const canvas = document.createElement('canvas');
          let w = img.width,
            h = img.height;
          if (w > maxW || h > maxH) {
            if (w / h > maxW / maxH) { h = Math.round(h * maxW / w); w = maxW; } else { w = Math.round(w * maxH / h); h = maxH; }
          }
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // -------------------- رفع الصورة --------------------
  async function uploadAvatar() {
    const file = document.getElementById('avatarInput').files[0];
    const msg = document.getElementById('avatarMsg');
    if (!file) return;
    if (!db) { msg.textContent = 'تغيير الصورة يحتاج اتصال بالإنترنت'; return; }
    msg.textContent = 'جاري معالجة الصورة...';
    try {
      const compressed = await compressImage(file, 200, 200, 0.7);
      await db.collection('users').doc(user.phone).update({ avatar: compressed });
      document.getElementById('accAvatarWrap').innerHTML = `<img class="av-img" src="${compressed}">`;
      msg.textContent = 'تم تحديث الصورة بنجاح ✅';
      msg.style.color = '#147a35';
    } catch (e) {
      msg.textContent = 'حدث خطأ: ' + e.message;
      msg.style.color = '#b00020';
    }
  }

  // -------------------- تغيير كلمة المرور --------------------
  async function updatePassword() {
    const np = document.getElementById('newPass').value;
    const msg = document.getElementById('accMsg');
    if (np.length < 6) {
      msg.textContent = 'كلمة المرور يجب ألا تقل عن 6 أحرف';
      msg.className = 'msg error';
      return;
    }
    if (!db) {
      msg.textContent = 'هذه العملية تحتاج اتصال بالإنترنت';
      msg.className = 'msg error';
      return;
    }
    try {
      await db.collection('users').doc(user.phone).update({ password: np });
      msg.textContent = '✅ تم تحديث كلمة المرور بنجاح';
      msg.className = 'msg';
      document.getElementById('newPass').value = '';
    } catch (e) {
      msg.textContent = 'حدث خطأ: ' + e.message;
      msg.className = 'msg error';
    }
  }
</script>

</body>
</html>
