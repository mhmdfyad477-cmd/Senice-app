<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منتدى علوم ابتدائي</title>
<style>
  :root{--blue-deep:#0a2e5c;--blue-main:#1565d8;--blue-bright:#2f9bf0;--ice:#eaf4ff;--gold:#f5a623;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Arial,sans-serif;}
  body{background:var(--ice);color:#0a2e5c;min-height:100vh;}
  .topbar{background:linear-gradient(135deg,var(--blue-main),var(--blue-deep));color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:30;box-shadow:0 4px 14px rgba(10,46,92,0.25);}
  .topbar a{color:#fff;text-decoration:none;font-size:13px;background:rgba(255,255,255,0.15);padding:8px 14px;border-radius:10px;transition:0.2s;}
  .topbar a:hover{background:rgba(255,255,255,0.25);}
  .wrap{max-width:900px;margin:24px auto;padding:0 16px;}
  .card-box{background:#fff;border-radius:16px;padding:20px;box-shadow:0 6px 18px rgba(10,46,92,0.06);margin-bottom:14px;}
  .post-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .post-author{font-weight:700;color:var(--blue-deep);font-size:15px;}
  .post-author .admin-badge{font-size:11px;color:#b00020;font-weight:400;}
  .post-author .anonymous-badge{font-size:11px;color:#7a93ad;font-weight:400;}
  .post-time{font-size:11px;color:#7a93ad;}
  .post-title{font-size:18px;font-weight:700;color:var(--blue-deep);margin-bottom:4px;}
  .post-body{font-size:14px;color:#1e3a5f;line-height:1.7;margin-bottom:8px;}
  .post-actions{display:flex;gap:12px;margin:6px 0;flex-wrap:wrap;border-top:1px solid #f0f4fa;padding-top:6px;}
  .post-actions button{background:transparent;border:none;color:var(--blue-main);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:0.2s;}
  .post-actions button:hover{background:#eaf4ff;}
  .post-actions button.liked{color:#b00020;}
  .post-delete-btn{color:#b00020;font-size:11px;background:transparent;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
  .post-delete-btn:hover{background:#ffe5e5;}
  .comment-box{background:#f8faff;padding:8px 12px;border-radius:10px;margin-top:6px;display:none;}
  .comment-box textarea{width:100%;padding:8px;border-radius:8px;border:1.5px solid #cfe2f7;font-size:13px;min-height:50px;margin-bottom:4px;}
  .comment-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px dashed #e0e8f0;font-size:13px;}
  .comment-item .comment-author{font-weight:600;color:var(--blue-deep);}
  .comment-item .comment-text{color:#1e3a5f;}
  .comment-item .comment-time{font-size:10px;color:#7a93ad;}
  .comment-item .comment-delete{color:#b00020;font-size:11px;background:transparent;border:none;cursor:pointer;}
  .comment-item .comment-delete:hover{text-decoration:underline;}
  .btn{border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;}
  .btn-blue{background:var(--blue-main);color:#fff;}
  .btn-approve{background:#147a35;color:#fff;}
  .btn-reject{background:#b00020;color:#fff;}
  .btn-sm{padding:4px 12px;font-size:12px;}
  .form-line{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .form-line input,.form-line textarea{padding:10px;border-radius:10px;border:1.5px solid #cfe2f7;flex:1;min-width:140px;font-size:14px;}
  .form-line textarea{min-height:70px;}
  .footer{text-align:center;font-size:11.5px;color:#9bb3cb;padding:18px 0;}
  .likes-count{font-size:11px;color:#7a93ad;}
  .comments-count{font-size:11px;color:#7a93ad;}
  .stats-row{display:flex;gap:12px;font-size:11px;color:#7a93ad;}
  @media(max-width:600px){.post-title{font-size:16px;}.post-body{font-size:13px;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand" style="font-weight:800;font-size:16px;">🗣️ منتدى علوم ابتدائي</div>
  <a href="home.html">🏠 الرجوع للرئيسية</a>
</div>

<div class="wrap">
  <!-- إنشاء منشور جديد -->
  <div class="card-box">
    <b style="display:block;margin-bottom:8px;">📝 منشور جديد</b>
    <div style="font-size:12px;color:#7a93ad;margin-bottom:8px;">🔒 سيظهر اسمك للأدمن فقط، وللطلاب ستظهر كمجهول</div>
    <div class="form-line">
      <input type="text" id="postTitle" placeholder="عنوان المنشور...">
    </div>
    <div class="form-line">
      <textarea id="postBody" placeholder="محتوى المنشور..."></textarea>
    </div>
    <button class="btn btn-blue" onclick="createPost()">📤 نشر</button>
    <p id="postMsg" style="font-size:12px;color:#7a93ad;margin-top:4px;"></p>
  </div>

  <!-- قائمة المنشورات -->
  <div id="postsList">
    <p style="font-size:13px;color:#7a93ad;">جاري التحميل...</p>
  </div>
</div>

<div class="footer">تم إنشاء هذا الموقع بواسطة MF.mo.fayyad</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBgI8VcLOdQAMgmcpxCzaMS1UCX1vyzSjw",
    authDomain: "science-e2b52.firebaseapp.com",
    projectId: "science-e2b52",
    storageBucket: "science-e2b52.firebasestorage.app",
    messagingSenderId: "1031434005860",
    appId: "1:1031434005860:web:e68fccdd746017a5639e71",
    measurementId: "G-JZ1SFVMM7P"
  };
  let db = null;
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  } catch (e) { console.warn('لا يوجد اتصال بالإنترنت', e); }

  function getCurrentUser() {
    const raw = localStorage.getItem('currentUser');
    return raw ? JSON.parse(raw) : null;
  }
  const user = getCurrentUser();
  if (!user) window.location.href = 'login.html';

  const isAdmin = user.role === 'admin' || user.role === 'co-admin';

  // ====== إنشاء منشور ======
  async function createPost() {
    const title = document.getElementById('postTitle').value.trim();
    const body = document.getElementById('postBody').value.trim();
    const msg = document.getElementById('postMsg');
    if (!title || !body) { msg.textContent = '⚠️ أدخل العنوان والمحتوى'; msg.style.color = '#b00020'; return; }
    if (!db) { msg.textContent = '❌ لا يوجد اتصال بالإنترنت'; return; }
    try {
      await db.collection('forumPosts').add({
        title,
        body,
        authorPhone: user.phone,
        authorName: user.name,
        createdAt: Date.now(),
        likes: [],
        comments: []
      });
      document.getElementById('postTitle').value = '';
      document.getElementById('postBody').value = '';
      msg.textContent = '✅ تم النشر';
      msg.style.color = '#147a35';
      loadPosts();
    } catch (e) { msg.textContent = '❌ خطأ: '+e.message; msg.style.color = '#b00020'; }
  }

  // ====== تحميل المنشورات ======
  async function loadPosts() {
    const box = document.getElementById('postsList');
    if (!db) { box.innerHTML = '<p style="font-size:13px;color:#7a93ad;">لا يوجد اتصال بالإنترنت</p>'; return; }
    box.innerHTML = 'جاري التحميل...';
    try {
      const snap = await db.collection('forumPosts').orderBy('createdAt', 'desc').get();
      if (snap.empty) { box.innerHTML = '<p style="font-size:13px;color:#7a93ad;">لا توجد منشورات بعد</p>'; return; }
      let html = '';
      snap.forEach(doc => {
        const p = doc.data();
        const postId = doc.id;
        const isLiked = p.likes && p.likes.includes(user.phone);
        const likesCount = p.likes ? p.likes.length : 0;
        const commentsCount = p.comments ? p.comments.length : 0;

        // ✅ اسم الناشر: مجهول للطلاب، ظاهر للأدمن
        let authorDisplay = 'مجهول';
        let authorBadge = '🔒';
        if (isAdmin) {
          authorDisplay = `${p.authorName} (${p.authorPhone})`;
          authorBadge = '👤';
        }

        // بناء التعليقات
        let commentsHtml = '';
        if (p.comments && p.comments.length > 0) {
          commentsHtml = p.comments.map(c => {
            let commentAuthor = 'مجهول';
            if (isAdmin) {
              commentAuthor = `${c.authorName} (${c.authorPhone})`;
            }
            const isCommentOwner = c.authorPhone === user.phone;
            const canDeleteComment = isAdmin || isCommentOwner;
            return `
              <div class="comment-item">
                <div>
                  <span class="comment-author">${commentAuthor}</span>
                  <span class="comment-text">${c.text}</span>
                  <span class="comment-time">${new Date(c.time).toLocaleString('ar')}</span>
                </div>
                ${canDeleteComment ? `<button class="comment-delete" onclick="deleteComment('${postId}', ${p.comments.indexOf(c)})">🗑</button>` : ''}
              </div>
            `;
          }).join('');
        }

        html += `
          <div class="card-box" id="post_${postId}">
            <div class="post-header">
              <div>
                <span class="post-author">${authorDisplay} <span class="${isAdmin ? 'admin-badge' : 'anonymous-badge'}">${authorBadge}</span></span>
                <span class="post-time">${new Date(p.createdAt).toLocaleString('ar')}</span>
              </div>
              ${isAdmin ? `<button class="post-delete-btn" onclick="deletePost('${postId}')">🗑 حذف المنشور</button>` : ''}
            </div>
            <div class="post-title">${p.title}</div>
            <div class="post-body">${p.body}</div>
            <div class="stats-row">
              <span class="likes-count">❤️ ${likesCount} إعجاب</span>
              <span class="comments-count">💬 ${commentsCount} تعليق</span>
            </div>
            <div class="post-actions">
              <button class="${isLiked ? 'liked' : ''}" onclick="toggleLike('${postId}')">
                ${isLiked ? '❤️' : '🤍'} ${isLiked ? 'إلغاء الإعجاب' : 'إعجاب'}
              </button>
              <button onclick="toggleCommentBox('${postId}')">💬 تعليق</button>
            </div>
            <div class="comment-box" id="commentBox_${postId}">
              <textarea id="commentInput_${postId}" placeholder="اكتب تعليقك..."></textarea>
              <button class="btn btn-approve btn-sm" onclick="addComment('${postId}')">إرسال</button>
              <button class="btn btn-reject btn-sm" onclick="toggleCommentBox('${postId}')">إلغاء</button>
            </div>
            ${commentsHtml ? `<div style="margin-top:8px;">${commentsHtml}</div>` : ''}
          </div>
        `;
      });
      box.innerHTML = html;
    } catch (e) { box.innerHTML = '<p style="font-size:13px;color:#b00020;">خطأ في التحميل</p>'; }
  }

  // ====== إعجاب / إلغاء إعجاب ======
  async function toggleLike(postId) {
    if (!db) return alert('لا يوجد اتصال بالإنترنت');
    try {
      const ref = db.collection('forumPosts').doc(postId);
      const snap = await ref.get();
      const p = snap.data();
      let likes = p.likes || [];
      if (likes.includes(user.phone)) {
        likes = likes.filter(phone => phone !== user.phone);
      } else {
        likes.push(user.phone);
      }
      await ref.update({ likes });
      loadPosts();
    } catch (e) { alert('خطأ: '+e.message); }
  }

  // ====== إظهار/إخفاء صندوق التعليق ======
  function toggleCommentBox(postId) {
    const box = document.getElementById(`commentBox_${postId}`);
    if (box.style.display === 'block') {
      box.style.display = 'none';
    } else {
      box.style.display = 'block';
      document.getElementById(`commentInput_${postId}`).focus();
    }
  }

  // ====== إضافة تعليق ======
  async function addComment(postId) {
    const input = document.getElementById(`commentInput_${postId}`);
    const text = input.value.trim();
    if (!text) return alert('اكتب تعليقاً');
    if (!db) return alert('لا يوجد اتصال بالإنترنت');
    try {
      const comment = {
        authorPhone: user.phone,
        authorName: user.name,
        text: text,
        time: Date.now()
      };
      await db.collection('forumPosts').doc(postId).update({
        comments: firebase.firestore.FieldValue.arrayUnion(comment)
      });
      input.value = '';
      document.getElementById(`commentBox_${postId}`).style.display = 'none';
      loadPosts();
    } catch (e) { alert('خطأ: '+e.message); }
  }

  // ====== حذف تعليق (للأدمن أو صاحب التعليق) ======
  async function deleteComment(postId, commentIndex) {
    if (!confirm('هل تريد حذف هذا التعليق؟')) return;
    try {
      const ref = db.collection('forumPosts').doc(postId);
      const snap = await ref.get();
      const p = snap.data();
      let comments = p.comments || [];
      if (commentIndex < comments.length) {
        const comment = comments[commentIndex];
        if (!isAdmin && comment.authorPhone !== user.phone) {
          return alert('⛔ غير مسموح لك بحذف هذا التعليق');
        }
        comments.splice(commentIndex, 1);
        await ref.update({ comments });
        loadPosts();
      }
    } catch (e) { alert('خطأ: '+e.message); }
  }

  // ====== حذف منشور (للأدمن فقط) ======
  async function deletePost(postId) {
    if (!confirm('هل تريد حذف هذا المنشور وجميع تعليقاته نهائياً؟')) return;
    try {
      await db.collection('forumPosts').doc(postId).delete();
      loadPosts();
    } catch (e) { alert('خطأ: '+e.message); }
  }

  loadPosts();
</script>
</body>
</html>
